name: Install mutr
description: Download mutr binary from GitHub releases (Linux amd64 only)

inputs:
  version:
    description: mutr version (without v prefix)
    default: "latest"
  github-token:
    description: GitHub token for private repo access
    default: ""

runs:
  using: composite
  steps:
    - name: Download mutr
      run: |
        AUTH_HEADER=""
        if [ -n "${{ inputs.github-token }}" ]; then
          AUTH_HEADER="Authorization: token ${{ inputs.github-token }}"
        fi
        if [ "${{ inputs.version }}" = "latest" ]; then
          URL=$(curl -fSL ${AUTH_HEADER:+-H "$AUTH_HEADER"} \
            https://api.github.com/repos/EspressoSystems/mutr/releases \
            | jq -r '.[0].assets[] | select(.name == "mutr-linux-amd64") | .browser_download_url')
        else
          URL="https://github.com/EspressoSystems/mutr/releases/download/v${{ inputs.version }}/mutr-linux-amd64"
        fi
        curl -fL ${AUTH_HEADER:+-H "$AUTH_HEADER"} -o /usr/local/bin/mutr "$URL"
        chmod +x /usr/local/bin/mutr
        mutr --version
      shell: bash
