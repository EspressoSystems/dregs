name: Release

on:
  push:
    tags: ["v*"]
  pull_request:
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "src/**"
      - ".github/workflows/release.yml"
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: mutr-linux-amd64
          - os: ubuntu-24.04-arm
            artifact: mutr-linux-aarch64
          - os: macos-latest
            artifact: mutr-macos-aarch64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release
      - run: cp target/release/mutr ${{ matrix.artifact }}
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Verify Cargo.toml version matches tag
        shell: bash
        run: |
          cargo_version=$(cargo metadata --format-version=1 --no-deps | jq -r '.packages[] | select(.name == "mutr") | .version')
          tag_version=${GITHUB_REF_NAME#v}
          if [ "$cargo_version" != "$tag_version" ]; then
            echo "::error::Version mismatch: Cargo.toml=$cargo_version tag=$tag_version"
            exit 1
          fi
      - uses: actions/download-artifact@v4
        with:
          pattern: mutr-*
          merge-multiple: true
      - name: Detect pre-release
        id: prerelease
        shell: bash
        run: |
          if [[ "$GITHUB_REF_NAME" == *-* ]]; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: mutr-*
          prerelease: ${{ steps.prerelease.outputs.is_prerelease }}
