name: Release

on:
  push:
    tags: ["v*"]
  pull_request:
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "src/**"
      - ".github/workflows/release.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: dregs-x86_64-unknown-linux-musl
            target: x86_64-unknown-linux-musl
          - os: ubuntu-24.04-arm
            artifact: dregs-aarch64-unknown-linux-musl
            target: aarch64-unknown-linux-musl
          - os: macos-latest
            artifact: dregs-aarch64-apple-darwin
            target: aarch64-apple-darwin
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - name: Install musl-tools
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y musl-tools
      - run: rustup target add ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release --target ${{ matrix.target }}
      - run: cp target/${{ matrix.target }}/release/dregs dregs
      - run: tar czf ${{ matrix.artifact }}.tar.gz dregs
      - run: sha256sum ${{ matrix.artifact }}.tar.gz > ${{ matrix.artifact }}.tar.gz.sha256 || shasum -a 256 ${{ matrix.artifact }}.tar.gz > ${{ matrix.artifact }}.tar.gz.sha256
      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}.tar.gz
            ${{ matrix.artifact }}.tar.gz.sha256

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Generate changelog
        id: cliff
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --latest --strip header
      - name: Verify Cargo.toml version matches tag
        shell: bash
        run: |
          cargo_version=$(cargo metadata --format-version=1 --no-deps | jq -r '.packages[] | select(.name == "dregs") | .version')
          tag_version=${GITHUB_REF_NAME#v}
          if [ "$cargo_version" != "$tag_version" ]; then
            echo "::error::Version mismatch: Cargo.toml=$cargo_version tag=$tag_version"
            exit 1
          fi
      - uses: actions/download-artifact@v8
        with:
          pattern: dregs-*
          merge-multiple: true
      - name: Detect pre-release
        id: prerelease
        shell: bash
        run: |
          if [[ "$GITHUB_REF_NAME" == *-* ]]; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.cliff.outputs.content }}
          files: dregs-*.tar.gz*
          prerelease: ${{ steps.prerelease.outputs.is_prerelease }}
