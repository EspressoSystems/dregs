name: "Example: Mutation Test (Sharded)"

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: foundry-rs/foundry-toolchain@v1
      - uses: ./.github/actions/install-solc
      - uses: ./.github/actions/install-dregs
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - run: dregs generate --project tests/fixtures/simple --output ./mutants
      - uses: actions/upload-artifact@v7
        with:
          name: mutants
          path: mutants/

  test-shard:
    needs: generate
    runs-on: ubuntu-latest
    strategy:
      matrix:
        shard: [1, 2, 3, 4]
    steps:
      - uses: actions/checkout@v6
      - uses: foundry-rs/foundry-toolchain@v1
      - uses: ./.github/actions/install-solc
      - uses: ./.github/actions/install-dregs
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/download-artifact@v8
        with:
          name: mutants
          path: mutants
      - run: >-
          dregs test
          --manifest ./mutants/manifest.json
          --project tests/fixtures/simple
          --partition slice:${{ matrix.shard }}/4
          --output results-${{ matrix.shard }}.json
      - uses: actions/upload-artifact@v7
        with:
          name: results-${{ matrix.shard }}
          path: results-${{ matrix.shard }}.json

  report:
    needs: test-shard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/install-dregs
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/download-artifact@v8
        with:
          name: mutants
          path: mutants
      - uses: actions/download-artifact@v8
        with:
          pattern: results-*
          merge-multiple: true
      - run: >-
          dregs report ./mutants/manifest.json results-*.json
          --format markdown
          | tee "$GITHUB_STEP_SUMMARY"
