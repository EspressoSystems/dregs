name: "Example: Mutation Test (Sharded)"

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  SOLC_VERSION: "0.8.30"

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: foundry-rs/foundry-toolchain@v1
      - name: Install solc
        run: |
          curl -fL -o /usr/local/bin/solc https://github.com/ethereum/solidity/releases/download/v${SOLC_VERSION}/solc-static-linux
          chmod +x /usr/local/bin/solc
          echo "FOUNDRY_SOLC=/usr/local/bin/solc" >> "$GITHUB_ENV"
          solc --version
      - name: Install dregs
        run: |
          URL=$(curl -fSL -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            https://api.github.com/repos/EspressoSystems/dregs/releases \
            | jq -r '.[0].assets[] | select(.name == "dregs-linux-amd64") | .url')
          curl -fL -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/octet-stream" -o /usr/local/bin/dregs "$URL"
          chmod +x /usr/local/bin/dregs
          dregs --version
      - run: dregs generate --project tests/fixtures/simple --output ./mutants
      - uses: actions/upload-artifact@v7
        with:
          name: mutants
          path: mutants/

  test-shard:
    needs: generate
    runs-on: ubuntu-latest
    strategy:
      matrix:
        shard: [1, 2, 3, 4]
    steps:
      - uses: actions/checkout@v6
      - uses: foundry-rs/foundry-toolchain@v1
      - name: Install solc
        run: |
          curl -fL -o /usr/local/bin/solc https://github.com/ethereum/solidity/releases/download/v${SOLC_VERSION}/solc-static-linux
          chmod +x /usr/local/bin/solc
          echo "FOUNDRY_SOLC=/usr/local/bin/solc" >> "$GITHUB_ENV"
          solc --version
      - name: Install dregs
        run: |
          URL=$(curl -fSL -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            https://api.github.com/repos/EspressoSystems/dregs/releases \
            | jq -r '.[0].assets[] | select(.name == "dregs-linux-amd64") | .url')
          curl -fL -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/octet-stream" -o /usr/local/bin/dregs "$URL"
          chmod +x /usr/local/bin/dregs
          dregs --version
      - uses: actions/download-artifact@v8
        with:
          name: mutants
          path: mutants
      - run: >-
          dregs test
          --manifest ./mutants/manifest.json
          --project tests/fixtures/simple
          --partition slice:${{ matrix.shard }}/4
          --output results-${{ matrix.shard }}.json
      - uses: actions/upload-artifact@v7
        with:
          name: results-${{ matrix.shard }}
          path: results-${{ matrix.shard }}.json

  report:
    needs: test-shard
    runs-on: ubuntu-latest
    steps:
      - name: Install dregs
        run: |
          URL=$(curl -fSL -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            https://api.github.com/repos/EspressoSystems/dregs/releases \
            | jq -r '.[0].assets[] | select(.name == "dregs-linux-amd64") | .url')
          curl -fL -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/octet-stream" -o /usr/local/bin/dregs "$URL"
          chmod +x /usr/local/bin/dregs
          dregs --version
      - uses: actions/download-artifact@v8
        with:
          name: mutants
          path: mutants
      - uses: actions/download-artifact@v8
        with:
          pattern: results-*
          merge-multiple: true
      - run: >-
          dregs report ./mutants/manifest.json results-*.json
          --format markdown
          | tee "$GITHUB_STEP_SUMMARY"
