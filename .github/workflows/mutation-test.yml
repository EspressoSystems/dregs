name: Mutation Test

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: Swatinem/rust-cache@v2
      - uses: foundry-rs/foundry-toolchain@v1
      - uses: ./.github/actions/install-solc
      - run: cargo build --release
      - run: ./target/release/dregs generate --project tests/fixtures/simple --output ./mutants
      - uses: actions/upload-artifact@v7
        with:
          name: mutants
          path: mutants/
      - uses: actions/upload-artifact@v7
        with:
          name: dregs-binary
          path: target/release/dregs

  test-shard:
    needs: generate
    runs-on: ubuntu-latest
    strategy:
      matrix:
        shard: [1, 2, 3, 4]
    steps:
      - uses: actions/checkout@v6
      - uses: foundry-rs/foundry-toolchain@v1
      - uses: ./.github/actions/install-solc
      - uses: actions/download-artifact@v8
        with:
          name: mutants
          path: mutants
      - uses: actions/download-artifact@v8
        with:
          name: dregs-binary
      - run: chmod +x ./dregs
      - run: >-
          ./dregs test
          --manifest ./mutants/manifest.json
          --project tests/fixtures/simple
          --partition slice:${{ matrix.shard }}/4
          --output results-${{ matrix.shard }}.json
      - uses: actions/upload-artifact@v7
        with:
          name: results-${{ matrix.shard }}
          path: results-${{ matrix.shard }}.json

  report:
    needs: test-shard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: mutants
          path: mutants
      - uses: actions/download-artifact@v8
        with:
          name: dregs-binary
      - uses: actions/download-artifact@v8
        with:
          pattern: results-*
          merge-multiple: true
      - run: chmod +x ./dregs
      - run: >-
          ./dregs report ./mutants/manifest.json results-*.json
          --format markdown --output report.json
          | tee "$GITHUB_STEP_SUMMARY"
      - uses: actions/upload-artifact@v7
        with:
          name: mutation-report
          path: report.json
